<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head th:replace="~{layout/header :: head('기술연구소 - 연구실적 현황')}"></head>
<body class="sub-page-body">
<nav th:replace="~{layout/header :: navbar}"></nav>

<div class="page-header"
     style="background-image: url('/images/lab/lab-bg.png');
            background-size: cover; background-repeat: no-repeat; background-position: center;">
  <div class="container">
    <h2>기술연구소</h2>
    <nav aria-label="breadcrumb">
      <ol class="breadcrumb">
        <li class="breadcrumb-item"><a th:href="@{/}" style="color:rgba(255,255,255,0.65);text-decoration:none;">HOME</a></li>
        <li class="breadcrumb-item">기술연구소</li>
        <li class="breadcrumb-item active">연구실적 현황</li>
      </ol>
    </nav>
  </div>
</div>

<div class="container">
  <div class="sub-container">
    <nav th:replace="~{layout/sidenav :: lab('result')}"></nav>
    <div class="sub-content">

      <div class="lab-section fade-up">
        <p class="lab-section-label">RESEARCH RESULT</p>
        <h4 class="lab-section-title">연구실적 현황</h4>
        <div class="prod-table-wrap">
          <table class="prod-table">
            <thead>
            <tr>
              <th>No</th>
              <th>연도</th>
              <th>연구 과제명</th>
              <th>발주처</th>
              <th>비고</th>
            </tr>
            </thead>
            <tbody>
            <tr>
              <td>1</td>
              <td>2024</td>
              <td style="text-align:left; padding-left:20px;">레이저 클래딩 분말 최적화 연구</td>
              <td>포스코</td>
              <td><span class="lab-badge lab-badge--done">완료</span></td>
            </tr>
            <tr>
              <td>2</td>
              <td>2023</td>
              <td style="text-align:left; padding-left:20px;">마그네슘 용융설비 내식성 개선</td>
              <td>전남TP</td>
              <td><span class="lab-badge lab-badge--done">완료</span></td>
            </tr>
            <tr>
              <td>3</td>
              <td>2023</td>
              <td style="text-align:left; padding-left:20px;">PTA 용접 자동화 공정 개발</td>
              <td>자체</td>
              <td><span class="lab-badge lab-badge--done">완료</span></td>
            </tr>
            <tr>
              <td>4</td>
              <td>2022</td>
              <td style="text-align:left; padding-left:20px;">알미늄 용융도금 합금층 분석</td>
              <td>포스코</td>
              <td><span class="lab-badge lab-badge--done">완료</span></td>
            </tr>
            <tr>
              <td>5</td>
              <td>2022</td>
              <td style="text-align:left; padding-left:20px;">유공압 시스템 에너지 효율화</td>
              <td>자체</td>
              <td><span class="lab-badge lab-badge--ongoing">진행중</span></td>
            </tr>
            <tr>
              <td>6</td>
              <td>2021</td>
              <td style="text-align:left; padding-left:20px;">용사코팅 분사 조건 표준화</td>
              <td>포스코</td>
              <td><span class="lab-badge lab-badge--done">완료</span></td>
            </tr>
            <!-- TODO: 연구실적 데이터 추가 -->
            </tbody>
          </table>
        </div>
      </div>

    </div>
  </div>
</div>

<div th:replace="~{layout/footer :: footer}"></div>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
<script>
  const observer = new IntersectionObserver((entries) => {
    entries.forEach(e => { if (e.isIntersecting) e.target.classList.add('visible'); });
  }, { threshold: 0.1 });
  document.querySelectorAll('.fade-up').forEach(el => observer.observe(el));
</script>
</body>
</html>
