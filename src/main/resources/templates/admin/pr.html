<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">

<head th:replace="~{admin/admin-layout :: head('홍보자료 관리')}"></head>

<body>
<div class="admin-wrap">

  <aside th:replace="~{admin/admin-layout :: sidebar('pr')}"></aside>

  <main class="admin-main">

    <h2 class="admin-page-title">홍보자료 관리</h2>
    <p class="admin-breadcrumb">HOME &gt; 관리자 &gt; 홍보자료</p>

    <!-- 알림 -->
    <div th:if="${successMsg}"
         style="background:#f0fff4;border:1px solid #b7ebc9;border-radius:8px;
                padding:12px 20px;margin-bottom:16px;color:#1d7a45;font-size:0.88rem;">
      <i class="bi bi-check-circle-fill me-2"></i>
      <span th:text="${successMsg}"></span>
    </div>
    <div th:if="${errorMsg}"
         style="background:#fff0f0;border:1px solid #fcc;border-radius:8px;
                padding:12px 20px;margin-bottom:16px;color:#c0392b;font-size:0.88rem;">
      <i class="bi bi-exclamation-circle-fill me-2"></i>
      <span th:text="${errorMsg}"></span>
    </div>

    <!-- PDF 업로드 영역 -->
    <div class="admin-card" style="margin-bottom:24px;">
      <div class="admin-card-header">
        <h5><i class="bi bi-cloud-upload me-2"></i>PDF 업로드</h5>
      </div>
      <div style="padding:24px;">
        <form th:action="@{/admin/pr/upload}" method="post"
              enctype="multipart/form-data">
          <div class="row g-3 align-items-center">

            <div class="col-md-4">
              <label class="form-label"
                     style="font-size:0.82rem;font-weight:700;color:#555;">
                자료 제목 *
              </label>
              <input type="text" name="title" class="form-control"
                     placeholder="예: 회사 브로셔 2025" required>
            </div>

            <div class="col-md-5">
              <label class="form-label"
                     style="font-size:0.82rem;font-weight:700;color:#555;">
                PDF 파일 *
              </label>
              <input type="file" name="pdfFile" class="form-control"
                     accept=".pdf" required onchange="fillTitle(this)">
            </div>

            <div class="col-md-3">
              <label class="form-label" style="visibility:hidden;">업로드</label>
              <button type="submit" class="btn-admin-primary w-100"
                      style="justify-content:center;padding:10px;">
                <i class="bi bi-upload me-1"></i> 업로드
              </button>
            </div>

          </div>
        </form>
      </div>
    </div>

    <!-- 홍보자료 카드 그리드 -->
    <div class="admin-pr-grid">

      <div th:if="${#lists.isEmpty(materials)}"
           style="grid-column:1/-1;text-align:center;padding:60px;color:#aaa;
                  background:#fff;border-radius:10px;">
        등록된 홍보자료가 없습니다.
      </div>

      <div th:each="mat : ${materials}" class="admin-pr-card">

        <div class="admin-pr-thumb">
          <img th:if="${mat.thumbnail}"
               th:src="${mat.thumbnail}"
               alt="썸네일"
               style="width:100%;height:100%;object-fit:cover;">
          <div th:unless="${mat.thumbnail}"
               style="display:flex;flex-direction:column;align-items:center;gap:8px;">
            <i class="bi bi-file-earmark-pdf-fill"></i>
            <span>PDF</span>
          </div>
        </div>

        <!-- 정보 -->
        <div class="admin-pr-body">
          <p class="admin-pr-title" th:text="${mat.title}">자료 제목</p>
          <p class="admin-pr-meta">
            <span th:text="${mat.fileName}">파일명.pdf</span>
            <span th:if="${mat.fileSize}"
                  th:text="${' · ' + #numbers.formatDecimal(mat.fileSize / 1048576.0, 1, 1) + 'MB'}"></span>
          </p>
        </div>

        <!-- 버튼 -->
        <div class="admin-pr-footer">
          <!-- 미리보기 (새 탭) -->
          <a th:href="${mat.filePath}" target="_blank"
             class="btn-admin-edit">
            <i class="bi bi-eye"></i> 미리보기
          </a>

          <!-- 제목 수정 버튼 -->
          <button type="button" class="btn-admin-edit"
                  th:data-id="${mat.id}"
                  th:data-title="${mat.title}"
                  onclick="openEditModal(this.dataset.id, this.dataset.title)">
            <i class="bi bi-pencil"></i> 수정
          </button>

          <!-- 삭제 -->
          <form th:action="@{/admin/pr/delete/{id}(id=${mat.id})}"
                method="post" style="display:inline;"
                onsubmit="return confirm('삭제하시겠습니까?')">
            <button type="submit" class="btn-admin-delete">
              <i class="bi bi-trash"></i> 삭제
            </button>
          </form>
        </div>

      </div>
    </div>

  </main>
</div>

<!-- 제목 수정 모달 -->
<div class="admin-modal-backdrop" id="editModal">
  <div class="admin-modal">
    <h5><i class="bi bi-pencil me-2"></i>제목 수정</h5>
    <form id="editForm" method="post">
      <div class="mb-3">
        <label class="form-label">자료 제목</label>
        <input type="text" name="title" id="editTitle" class="form-control" required>
      </div>
      <div class="admin-modal-footer">
        <button type="button" class="btn-modal-cancel"
                onclick="closeEditModal()">취소</button>
        <button type="submit" class="btn-modal-submit">저장</button>
      </div>
    </form>
  </div>
</div>

<script>
  function openEditModal(id, title) {
    document.getElementById('editForm').action = '/admin/pr/edit/' + id;
    document.getElementById('editTitle').value = title;
    document.getElementById('editModal').classList.add('active');
  }
  function closeEditModal() {
    document.getElementById('editModal').classList.remove('active');
  }
  document.getElementById('editModal').addEventListener('click', function(e) {
    if (e.target === this) closeEditModal();
  });

  function fillTitle(input) {
    if (!input.files.length) return;

    const fileName = input.files[0].name;
    const titleInput = document.querySelector('input[name="title"]');

    if (!titleInput.value.trim()) {
      titleInput.value = fileName.replace(/\.[^/.]+$/, '');
    }
  }
</script>

</body>
</html>
