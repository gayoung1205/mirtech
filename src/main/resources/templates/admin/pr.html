<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">

<head th:replace="~{admin/admin-layout :: head('홍보자료 관리')}"></head>

<body>
<div class="admin-wrap">

  <aside th:replace="~{admin/admin-layout :: sidebar('pr')}"></aside>

  <main class="admin-main">

    <h2 class="admin-page-title">홍보자료 관리</h2>
    <p class="admin-breadcrumb">HOME &gt; 관리자 &gt; 홍보자료</p>

    <div th:if="${successMsg}"
         style="background:#f0fff4;border:1px solid #b7ebc9;border-radius:8px;
                padding:12px 20px;margin-bottom:16px;color:#1d7a45;font-size:0.88rem;">
      <i class="bi bi-check-circle-fill me-2"></i>
      <span th:text="${successMsg}"></span>
    </div>
    <div th:if="${errorMsg}"
         style="background:#fff0f0;border:1px solid #fcc;border-radius:8px;
                padding:12px 20px;margin-bottom:16px;color:#c0392b;font-size:0.88rem;">
      <i class="bi bi-exclamation-circle-fill me-2"></i>
      <span th:text="${errorMsg}"></span>
    </div>

    <!-- PDF 업로드 -->
    <div class="admin-card" style="margin-bottom:24px;">
      <div class="admin-card-header">
        <h5><i class="bi bi-cloud-upload me-2"></i>PDF 업로드</h5>
      </div>
      <div class="admin-pr-upload-form">
        <p class="admin-pr-upload-desc">
          PDF 형식만 지원 · 최대 50MB<br>
          업로드 후 홍보자료 목록에 즉시 반영됩니다.
        </p>
        <form th:action="@{/admin/pr/upload}" method="post"
              enctype="multipart/form-data"
              class="admin-pr-upload-fields">
          <input type="text" name="title" placeholder="자료 제목 *" required>
          <input type="file" name="pdfFile" accept=".pdf"
                 required onchange="fillTitle(this)">
          <button type="submit" class="btn-pr-upload">
            <i class="bi bi-upload"></i> 업로드
          </button>
        </form>
      </div>
    </div>

    <!-- 홍보자료 목록 -->
    <div class="admin-pr-list">

      <div th:if="${#lists.isEmpty(materials)}"
           style="text-align:center;padding:60px;color:#aaa;
                  background:#fff;border-radius:10px;border:1px solid #eaecf0;">
        등록된 홍보자료가 없습니다.
      </div>

      <div th:each="mat : ${materials}" class="admin-pr-row">
        <div class="admin-pr-icon"><span>PDF</span></div>
        <div class="admin-pr-info">
          <p class="admin-pr-title" th:text="${mat.title}">자료 제목</p>
          <p class="admin-pr-meta" th:text="${mat.fileName}">파일명.pdf</p>
        </div>
        <span class="admin-pr-size"
              th:if="${mat.fileSize}"
              th:text="${#numbers.formatDecimal(mat.fileSize / 1048576.0, 1, 1) + 'MB'}">
        </span>
        <div class="admin-pr-actions">
          <a th:href="${mat.filePath}" target="_blank" class="btn-admin-edit">
            <i class="bi bi-eye"></i> 미리보기
          </a>
          <button type="button" class="btn-admin-edit"
                  th:data-id="${mat.id}" th:data-title="${mat.title}"
                  onclick="openEditModal(this.dataset.id, this.dataset.title)">
            <i class="bi bi-pencil"></i> 수정
          </button>
          <form th:action="@{/admin/pr/delete/{id}(id=${mat.id})}"
                method="post" style="display:inline;"
                onsubmit="return confirm('삭제하시겠습니까?')">
            <button type="submit" class="btn-admin-delete">
              <i class="bi bi-trash"></i> 삭제
            </button>
          </form>
        </div>
      </div>

    </div>
  </main>
</div>

<div id="editModal" class="admin-modal-backdrop">
  <div class="admin-modal">
    <h5>제목 수정</h5>
    <form id="editForm" method="post">
      <div class="mb-3">
        <label class="form-label">자료 제목</label>
        <input type="text" id="editTitle" name="title" class="form-control" required>
      </div>
      <div class="admin-modal-footer">
        <button type="button" class="btn-modal-cancel" onclick="closeEditModal()">취소</button>
        <button type="submit" class="btn-pr-upload" style="width:auto;padding:9px 20px;">저장</button>
      </div>
    </form>
  </div>
</div>

<script>
  function fillTitle(input) {
    const t = input.closest('form').querySelector('input[name="title"]');
    if (t && !t.value) t.value = input.files[0]?.name.replace(/\.pdf$/i,'') || '';
  }
  function openEditModal(id, title) {
    document.getElementById('editTitle').value = title;
    document.getElementById('editForm').action = '/admin/pr/edit/' + id;
    document.getElementById('editModal').classList.add('active');
  }
  function closeEditModal() {
    document.getElementById('editModal').classList.remove('active');
  }
</script>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
