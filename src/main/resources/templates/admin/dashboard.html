<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">

<!-- ① CSS는 head fragment에서 가져옴 -->
<head th:replace="~{admin/admin-layout :: head('대시보드')}"></head>

<body>
<div class="admin-wrap">

  <!-- ② 사이드바 fragment 가져옴 — 'dashboard' 활성 표시 -->
  <aside th:replace="~{admin/admin-layout :: sidebar('dashboard')}"></aside>

  <!-- ③ 메인 콘텐츠 -->
  <main class="admin-main">

    <h2 class="admin-page-title">관리자 대시보드</h2>
    <p class="admin-breadcrumb">HOME &gt; 관리자 로그인 &gt; 대시보드</p>

    <!-- 통계 카드 -->
    <div class="admin-stat-grid">
      <div class="admin-stat-card orange">
        <i class="bi bi-envelope-exclamation admin-stat-icon"></i>
        <div class="admin-stat-label">미확인 견적문의</div>
        <div class="admin-stat-number" th:text="${inquiryCount}">0</div>
      </div>
      <div class="admin-stat-card">
        <i class="bi bi-megaphone admin-stat-icon"></i>
        <div class="admin-stat-label">공지사항</div>
        <div class="admin-stat-number" th:text="${noticeCount}">0</div>
      </div>
      <div class="admin-stat-card green">
        <i class="bi bi-journal-bookmark admin-stat-icon"></i>
        <div class="admin-stat-label">기술자료실</div>
        <div class="admin-stat-number" th:text="${referenceCount}">0</div>
      </div>
      <div class="admin-stat-card purple">
        <i class="bi bi-card-image admin-stat-icon"></i>
        <div class="admin-stat-label">갤러리 이미지</div>
        <div class="admin-stat-number" th:text="${galleryCount}">0</div>
      </div>
    </div>

    <!-- 최근 견적문의 테이블 -->
    <div class="admin-card">
      <div class="admin-card-header">
        <h5><i class="bi bi-clock-history me-2"></i>최근 견적문의</h5>
        <a th:href="@{/admin/inquiry}">전체보기 →</a>
      </div>
      <table class="admin-table">
        <thead>
        <tr>
          <th>이름</th>
          <th>사업분야</th>
          <th>연락처</th>
          <th>접수일</th>
          <th>상태</th>
        </tr>
        </thead>
        <tbody>
        <tr th:each="inq : ${recentInquiries}">
          <td th:text="${inq.name}">홍길동</td>
          <td th:text="${inq.bizType}">레이저클래딩</td>
          <td th:text="${inq.phone}">010-0000-0000</td>
          <td th:text="${#temporals.format(inq.createdAt, 'MM-dd')}">03-05</td>
          <td>
            <span th:if="${!inq.read}" class="badge-unread">미확인</span>
            <span th:if="${inq.read}"  class="badge-done">완료</span>
          </td>
        </tr>
        <tr th:if="${#lists.isEmpty(recentInquiries)}">
          <td colspan="5" style="text-align:center; padding:40px; color:#aaa;">
            접수된 견적문의가 없습니다.
          </td>
        </tr>
        </tbody>
      </table>
    </div>

  </main>
</div>
</body>
</html>
