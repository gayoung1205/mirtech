<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">

<head th:replace="~{admin/admin-layout :: head('대시보드')}"></head>

<body>
<div class="admin-wrap">

  <!-- 사이드바 -->
  <aside th:replace="~{admin/admin-layout :: sidebar('dashboard')}"></aside>

  <!-- 메인 콘텐츠 -->
  <main class="admin-main">

    <div class="admin-page-title">관리자 대시보드</div>
    <div class="admin-breadcrumb">HOME &gt; 관리자 &gt; 대시보드</div>

    <!-- 견적 통계 카드 -->
    <div class="admin-stat-grid">

      <div class="admin-stat-card highlight">
        <div class="admin-stat-label">
          <span class="admin-stat-dot"></span> 미확인 견적
        </div>
        <div class="admin-stat-number" th:text="${unreadInquiryCount}">0</div>
        <div class="admin-stat-sub"><b>확인이 필요합니다</b></div>
      </div>

      <div class="admin-stat-card">
        <div class="admin-stat-label">전체 견적</div>
        <div class="admin-stat-number" th:text="${totalInquiryCount}">0</div>
        <div class="admin-stat-sub">누적 접수 건수</div>
      </div>

      <div class="admin-stat-card">
        <div class="admin-stat-label">처리 완료</div>
        <div class="admin-stat-number" th:text="${readInquiryCount}">0</div>
        <div class="admin-stat-sub">
          처리율 <b th:text="${totalInquiryCount > 0}
              ? ${#numbers.formatDecimal(readInquiryCount * 100.0 / totalInquiryCount, 1, 0)} + '%'
              : '0%'">0%</b>
        </div>
      </div>

      <div class="admin-stat-card">
        <div class="admin-stat-label">이번 달 접수</div>
        <div class="admin-stat-number" th:text="${monthlyInquiryCount}">0</div>
        <div class="admin-stat-sub">
          전월 대비 <b th:text="${monthlyDiff >= 0} ? '+' + ${monthlyDiff} + '건' : ${monthlyDiff} + '건'">+0건</b>
        </div>
      </div>

    </div>

    <!-- 최근 견적문의 테이블 -->
    <div class="admin-card">
      <div class="admin-card-header">
        <h5><i class="bi bi-clock-history me-2"></i>최근 견적문의</h5>
        <a th:href="@{/admin/inquiry}">전체보기 →</a>
      </div>
      <table class="admin-table">
        <thead>
        <tr>
          <th>이름</th>
          <th>사업분야</th>
          <th>연락처</th>
          <th>접수일</th>
          <th>상태</th>
        </tr>
        </thead>
        <tbody>
        <tr th:each="inq : ${recentInquiries}">
          <td th:text="${inq.name}">홍길동</td>
          <td th:text="${inq.bizType}">레이저클래딩</td>
          <td th:text="${inq.phone}">010-0000-0000</td>
          <td th:text="${#temporals.format(inq.createdAt, 'MM-dd')}">03-05</td>
          <td>
            <span th:if="${!inq.read}" class="badge-unread">미확인</span>
            <span th:if="${inq.read}"  class="badge-done">완료</span>
          </td>
        </tr>
        <tr th:if="${#lists.isEmpty(recentInquiries)}">
          <td colspan="5" style="text-align:center; padding:40px; color:#aaa;">
            접수된 견적문의가 없습니다.
          </td>
        </tr>
        </tbody>
      </table>
    </div>

  </main>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
