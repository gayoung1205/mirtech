<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>MIRTECH 관리자 로그인</title>
  <link rel="stylesheet"
        href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css">
  <link rel="stylesheet"
        href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.0/font/bootstrap-icons.css">
  <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@400;500;700&display=swap"
        rel="stylesheet">
  <style>
    * { font-family: 'Noto Sans KR', sans-serif; }
    body {
      background: #0d2a5e;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
    }
    .login-card {
      background: #fff;
      border-radius: 12px;
      width: 100%;
      max-width: 420px;
      overflow: hidden;
      box-shadow: 0 20px 60px rgba(0,0,0,0.3);
    }
    .login-header {
      background: #1a5fd1;
      padding: 32px 40px 28px;
      text-align: center;
      color: #fff;
    }
    .login-header h1 {
      font-size: 1.4rem;
      font-weight: 700;
      margin: 0 0 4px;
      letter-spacing: 2px;
    }
    .login-header p {
      font-size: 0.82rem;
      color: rgba(255,255,255,0.75);
      margin: 0;
    }
    .login-body { padding: 32px 40px 36px; }
    .form-label {
      font-size: 0.85rem;
      font-weight: 600;
      color: #333;
      margin-bottom: 6px;
    }
    .form-control {
      border: 1px solid #d0d9e8;
      border-radius: 6px;
      padding: 11px 14px;
      font-size: 0.9rem;
      transition: border-color 0.2s, box-shadow 0.2s;
    }
    .form-control:focus {
      border-color: #1a5fd1;
      box-shadow: 0 0 0 3px rgba(26,95,209,0.12);
      outline: none;
    }
    .btn-login {
      width: 100%;
      background: #1a5fd1;
      color: #fff;
      border: none;
      border-radius: 6px;
      padding: 12px;
      font-size: 1rem;
      font-weight: 700;
      margin-top: 8px;
      transition: background 0.2s;
      cursor: pointer;
    }
    .btn-login:hover { background: #1448a8; }
    .alert-error {
      background: #fff0f0;
      border: 1px solid #fcc;
      border-radius: 6px;
      color: #c0392b;
      font-size: 0.85rem;
      padding: 10px 14px;
      margin-bottom: 16px;
      display: flex;
      align-items: center;
      gap: 8px;
    }
    .alert-success {
      background: #f0fff4;
      border: 1px solid #b7ebc9;
      border-radius: 6px;
      color: #1d7a45;
      font-size: 0.85rem;
      padding: 10px 14px;
      margin-bottom: 16px;
      display: flex;
      align-items: center;
      gap: 8px;
    }
  </style>
</head>

<body>
  <div class="login-card">
    <div class="login-header">
      <h1>MIRTECH ADMIN</h1>
      <p>관리자 전용 로그인</p>
    </div>

    <div class="login-body">
      <div th:if="${param.error}" class="alert-error">
        <i class="bi bi-exclamation-circle-fill"></i>
        아이디 또는 비밀번호가 올바르지 않습니다.
      </div>

      <div th:if="${param.logout}" class="alert-success">
        <i class="bi bi-check-circle-fill"></i>
        정상적으로 로그아웃되었습니다.
      </div>

      <form th:action="@{/admin/login}" method="post">
        <div class="mb-3">
          <label class="form-label">아이디</label>
          <input type="text" name="username" class="form-control"
                 placeholder="아이디를 입력하세요" autocomplete="username" required>
        </div>
        <div class="mb-4">
          <label class="form-label">비밀번호</label>
          <input type="password" name="password" class="form-control"
                 placeholder="비밀번호를 입력하세요" autocomplete="current-password" required>
        </div>
        <button type="submit" class="btn-login">로그인</button>
      </form>
    </div>
  </div>
</body>
</html>

    </div>
  </div>
</body>
