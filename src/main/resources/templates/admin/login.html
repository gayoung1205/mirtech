<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>MIRTECH 관리자 로그인</title>
  <link rel="stylesheet"
        href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css">
  <link rel="stylesheet"
        href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.0/font/bootstrap-icons.css">
  <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@300;400;500;600;700&display=swap"
        rel="stylesheet">
  <link rel="stylesheet" th:href="@{/css/admin.css}">
</head>

<body class="admin-login-body">

<div class="login-container">

  <div class="login-card">

    <div class="login-card-header">
      <h2 class="login-title">관리자 로그인</h2>
      <p class="login-desc">허가된 관리자만 접근할 수 있습니다.</p>
    </div>

    <!-- 에러 / 성공 알림 -->
    <div th:if="${param.error}" class="alert-box alert-error">
      <i class="bi bi-shield-exclamation"></i>
      <span>아이디 또는 비밀번호가 올바르지 않습니다.</span>
    </div>
    <div th:if="${param.logout}" class="alert-box alert-success">
      <i class="bi bi-check-circle"></i>
      <span>정상적으로 로그아웃되었습니다.</span>
    </div>

    <!-- 로그인 폼 -->
    <form th:action="@{/admin/login}" method="post">

      <div class="field-group">
        <label class="field-label" for="username">
          <i class="bi bi-person-fill"></i> 아이디
        </label>
        <input
            type="text"
            id="username"
            name="username"
            class="field-input"
            placeholder="아이디를 입력하세요"
            autocomplete="username"
            required
        >
      </div>

      <div class="field-group">
        <label class="field-label" for="password">
          <i class="bi bi-lock-fill"></i> 비밀번호
        </label>
        <div class="field-pw-wrap">
          <input
              type="password"
              id="password"
              name="password"
              class="field-input"
              placeholder="비밀번호를 입력하세요"
              autocomplete="current-password"
              required
          >
          <button type="button" class="btn-toggle-pw" onclick="togglePassword()" tabindex="-1">
            <i class="bi bi-eye" id="pw-icon"></i>
          </button>
        </div>
      </div>

      <button type="submit" class="btn-login">
        로그인
      </button>

    </form>

    <!-- 보안 안내 -->
    <div class="login-security">
      <i class="bi bi-shield-lock-fill"></i>
      보안 연결 · 세션 만료 시 자동 로그아웃
    </div>

  </div>
  <!-- /카드 -->

</div>

<script>
  function togglePassword() {
    const pw = document.getElementById('password');
    const icon = document.getElementById('pw-icon');
    if (pw.type === 'password') {
      pw.type = 'text';
      icon.classList.replace('bi-eye', 'bi-eye-slash');
    } else {
      pw.type = 'password';
      icon.classList.replace('bi-eye-slash', 'bi-eye');
    }
  }
</script>

</body>
</html>
