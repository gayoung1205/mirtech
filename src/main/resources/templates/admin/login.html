<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>MIRTECH 관리자 로그인</title>
  <link rel="stylesheet"
        href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css">
  <link rel="stylesheet"
        href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.0/font/bootstrap-icons.css">
  <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@400;500;700&display=swap"
        rel="stylesheet">
  <link rel="stylesheet" th:href="@{/css/admin.css}">
</head>

<body class="admin-login-body">
  <div class="login-card">
    <div class="login-header">
      <h1>MIRTECH ADMIN</h1>
      <p>관리자 전용 로그인</p>
    </div>

    <div class="login-body">
      <div th:if="${param.error}" class="alert-error">
        <i class="bi bi-exclamation-circle-fill"></i>
        아이디 또는 비밀번호가 올바르지 않습니다.
      </div>

      <div th:if="${param.logout}" class="alert-success">
        <i class="bi bi-check-circle-fill"></i>
        정상적으로 로그아웃되었습니다.
      </div>

      <form th:action="@{/admin/login}" method="post">
        <div class="mb-3">
          <label class="form-label">아이디</label>
          <input type="text" name="username" class="form-control"
                 placeholder="아이디를 입력하세요" autocomplete="username" required>
        </div>
        <div class="mb-4">
          <label class="form-label">비밀번호</label>
          <input type="password" name="password" class="form-control"
                 placeholder="비밀번호를 입력하세요" autocomplete="current-password" required>
        </div>
        <button type="submit" class="btn-login">로그인</button>
      </form>
    </div>
  </div>
</body>
</html>

    </div>
  </div>
</body>
