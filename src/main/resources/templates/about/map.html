<script>
  let gwangyangInitialized = false;

  function switchMap(type, btn) {
    document.querySelectorAll('.map-tab').forEach(t => t.classList.remove('active'));
    btn.classList.add('active');
    document.getElementById('map-main').style.display = type === 'main' ? 'block' : 'none';
    document.getElementById('map-gwangyang').style.display = type === 'gwangyang' ? 'block' : 'none';
    document.getElementById('info-main').style.display = type === 'main' ? 'grid' : 'none';
    document.getElementById('info-gwangyang').style.display = type === 'gwangyang' ? 'grid' : 'none';
  }

  const fadeEls = document.querySelectorAll('.fade-up');
  const observer = new IntersectionObserver((entries) => {
    entries.forEach(entry => {
      if (entry.isIntersecting) entry.target.classList.add('visible');
    });
  }, { threshold: 0.1 });
  fadeEls.forEach(el => observer.observe(el));
</script>
