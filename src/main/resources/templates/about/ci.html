<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">

<head th:replace="~{layout/header :: head('회사소개 - 회사소개(CI)')}"></head>

<body class="sub-page-body">

<nav th:replace="~{layout/header :: navbar}"></nav>

<!-- 페이지 헤더 -->
<div class="page-header"
     style="background-image: url('/images/about/ci-bg.png');
            background-size: cover;
            background-repeat: no-repeat;
            background-position: center;">
  <div class="container">
    <h2>회사소개</h2>
    <nav aria-label="breadcrumb">
      <ol class="breadcrumb">
        <li class="breadcrumb-item">
          <a th:href="@{/}" style="color:rgba(255,255,255,0.65); text-decoration:none;">HOME</a>
        </li>
        <li class="breadcrumb-item active">회사소개(CI)</li>
      </ol>
    </nav>
  </div>
</div>

<!-- 본문 -->
<div class="container">
  <div class="sub-container">

    <nav th:replace="~{layout/sidenav :: about('ci')}"></nav>

    <div class="sub-content">
      <h3 class="sub-content-title">회사소개(CI)</h3>

      <div class="ci-wrap">

        <!-- 이미지 -->
        <div class="ci-image-box">
          <img src="/images/about/ci-company.png"
               alt="미르테크 전경"
               onerror="this.style.display='none'; this.nextElementSibling.style.display='flex';">
          <div class="ci-image-placeholder">
            <i class="bi bi-building"></i>
            <span>회사 이미지</span>
          </div>
        </div>

        <!-- 정보 -->
        <div class="ci-info">
          <h2 class="ci-company-name">(주)미르테크</h2>
          <p class="ci-company-eng">MIRTECH CO., Ltd.</p>

          <div class="ci-table">
            <div class="ci-row">
              <span class="ci-key">회사명</span>
              <span class="ci-val">(주)미르테크 · MIRTECH CO., Ltd.</span>
            </div>
            <div class="ci-row">
              <span class="ci-key">대표자</span>
              <span class="ci-val">김 학 윤</span>
            </div>
            <div class="ci-row">
              <span class="ci-key">설립일</span>
              <span class="ci-val">
                                2014년 05월 07일 미르테크 설립<br>
                                2021년 07월 01일 신규법인 설립
                            </span>
            </div>
            <div class="ci-row">
              <span class="ci-key">업태</span>
              <span class="ci-val">제조업, 도소매업</span>
            </div>
            <div class="ci-row">
              <span class="ci-key">종목</span>
              <span class="ci-val">
                                레이저클래딩 · 금속탱크 및 저장용기 제조업<br>
                                일반·특수기계 제조업
                            </span>
            </div>
            <div class="ci-row">
              <span class="ci-key">본사 · 공장</span>
              <span class="ci-val">전남 순천시 해룡면 해룡산단1로 82-20</span>
            </div>
            <div class="ci-row">
              <span class="ci-key">광양사무소</span>
              <span class="ci-val">전남 광양시 익신산단3길 40 지식산업센터 403호</span>
            </div>
          </div>
        </div>

      </div>
    </div>
  </div>
</div>

<div th:replace="~{layout/footer :: footer}"></div>

</body>
</html>
