<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout">

<!--
    layout:decorate 로 이 파일을 뼈대로 사용
    각 서브 페이지에서 layout:fragment="content" 로 콘텐츠 주입
-->

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>미르테크</title>

  <link rel="stylesheet"
        href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css">
  <link rel="stylesheet"
        href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.0/font/bootstrap-icons.css">
  <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@400;500;700;900&display=swap"
        rel="stylesheet">
  <link rel="stylesheet" th:href="@{/css/style.css}">
  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</head>

<body>

<!-- navbar -->
<nav th:replace="~{layout/header :: navbar}"></nav>

<!-- 상단 페이지 헤더 -->
<div class="page-header">
  <div class="container">
    <h2 layout:fragment="pageTitle">페이지명</h2>
    <nav aria-label="breadcrumb">
      <ol class="breadcrumb">
        <li class="breadcrumb-item">
          <a th:href="@{/}"
             style="color:rgba(255,255,255,0.65); text-decoration:none;">HOME</a>
        </li>
        <!-- 각 페이지에서 breadcrumb 추가 가능 -->
        <li layout:fragment="breadcrumb"
            class="breadcrumb-item active">페이지명</li>
      </ol>
    </nav>
  </div>
</div>

<!-- 본문 -->
<div class="container">
  <div class="sub-container">

    <!-- 왼쪽 사이드 탭 (각 페이지에서 교체) -->
    <nav class="side-nav" layout:fragment="sideNav">
    </nav>

    <!-- 오른쪽 콘텐츠 (각 페이지에서 채움) -->
    <div class="sub-content">
      <div layout:fragment="content">
        <!-- 각 페이지 콘텐츠가 여기 들어옴 -->
      </div>
    </div>

  </div>
</div>

<!-- footer -->
<div th:replace="~{layout/footer :: footer}"></div>

</body>
</html>
