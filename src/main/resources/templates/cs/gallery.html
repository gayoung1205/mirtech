<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">

<head th:replace="~{layout/header :: head('고객센터 - 갤러리')}"></head>

<body class="sub-page-body">
<nav th:replace="~{layout/header :: navbar}"></nav>

<div class="page-header"
     style="background-image: url('/images/cs/gallery-bg.jpg');
            background-size: cover; background-position: center;">
  <div class="container">
    <h2>고객센터</h2>
    <nav aria-label="breadcrumb">
      <ol class="breadcrumb">
        <li class="breadcrumb-item">
          <a th:href="@{/}" style="color:rgba(255,255,255,0.65); text-decoration:none;">HOME</a>
        </li>
        <li class="breadcrumb-item">고객센터</li>
        <li class="breadcrumb-item active">갤러리</li>
      </ol>
    </nav>
  </div>
</div>

<div class="container">
  <div class="sub-container">
    <nav th:replace="~{layout/sidenav :: cs('gallery')}"></nav>

    <div class="sub-content">

      <h3 class="sub-content-title">갤러리</h3>

      <!-- 이미지 그리드 -->
      <div class="cs-gallery-grid fade-up">

        <div th:if="${galleries.isEmpty()}"
             style="grid-column:1/-1; text-align:center; padding:60px; color:#999;">
          등록된 사진이 없습니다.
        </div>

        <div th:each="item : ${galleries}"
             class="cs-gallery-item"
             th:onclick="|openLightbox('${item.imagePath}')|">
          <img th:src="${item.imagePath}"
               th:alt="${item.title}"
               onerror="this.style.display='none'; this.nextElementSibling.style.display='flex';">
          <div class="cs-gallery-placeholder"><i class="bi bi-image"></i></div>
          <div class="cs-gallery-overlay">
            <i class="bi bi-zoom-in"></i>
            <span th:if="${item.title}" th:text="${item.title}"></span>
          </div>
        </div>

      </div><!-- /cs-gallery-grid -->

      <!-- 페이지네이션 -->
      <div class="cs-pagination" th:if="${galleries.totalPages > 1}">
        <a th:if="${currentPage > 0}"
           th:href="@{/cs/gallery(page=${currentPage-1})}"
           class="cs-page-btn">◁</a>
        <a th:each="i : ${#numbers.sequence(0, galleries.totalPages - 1)}"
           th:href="@{/cs/gallery(page=${i})}"
           th:text="${i + 1}"
           th:class="${i == currentPage} ? 'cs-page-btn active' : 'cs-page-btn'"></a>
        <a th:if="${currentPage < galleries.totalPages - 1}"
           th:href="@{/cs/gallery(page=${currentPage+1})}"
           class="cs-page-btn">▷</a>
      </div>

    </div>
  </div>
</div>

<!-- 라이트박스 -->
<div class="cs-lightbox" id="lightbox" onclick="closeLightbox()">
  <div class="cs-lightbox-close" onclick="closeLightbox()">
    <i class="bi bi-x-lg"></i>
  </div>
  <img class="cs-lightbox-img" id="lightbox-img" src="" alt="">
</div>

<div th:replace="~{layout/footer :: footer}"></div>
<script>
  function openLightbox(src) {
    document.getElementById('lightbox-img').src = src;
    document.getElementById('lightbox').classList.add('active');
    document.body.style.overflow = 'hidden';
  }
  function closeLightbox() {
    document.getElementById('lightbox').classList.remove('active');
    document.body.style.overflow = '';
  }
  document.addEventListener('keydown', e => {
    if (e.key === 'Escape') closeLightbox();
  });

  const fadeEls = document.querySelectorAll('.fade-up');
  const observer = new IntersectionObserver(entries => {
    entries.forEach(e => { if (e.isIntersecting) e.target.classList.add('visible'); });
  }, { threshold: 0.1 });
  fadeEls.forEach(el => observer.observe(el));
</script>
</body>
</html>
